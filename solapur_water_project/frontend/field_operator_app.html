<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Field Operator — Dhara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F0F4F8;
      --surface: #FFFFFF;
      --border: #DDE3EA;
      --text: #1A2332;
      --text2: #4A5568;
      --text3: #8A96A4;
      --blue: #0D5FA8;
      --bluel: #EBF3FB;
      --blue2: #1976D2;
      --red: #D32F2F;
      --orange: #E65100;
      --yellow: #F9A825;
      --green: #2E7D32;
      --shad: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* ── Wrapper ── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── Screen toggles ── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ── Header ── */
    .topbar {
      background: var(--blue);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .03em;
    }

    .topbar-sub {
      font-size: 11px;
      opacity: .7;
      margin-top: 2px;
    }

    .logout-btn {
      font-size: 12px;
      padding: 5px 12px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: 'IBM Plex Sans', sans-serif;
      white-space: nowrap;
      transition: background .15s;
    }

    .logout-btn:hover { background: rgba(255,255,255,.22); }

    /* ── Login screen ── */
    #screen-login {
      justify-content: center;
      align-items: center;
      padding: 32px 20px;
    }

    .login-box {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shad);
      padding: 32px 24px;
      width: 100%;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .login-logo .brand {
      font-size: 18px;
      font-weight: 600;
      color: var(--blue);
      letter-spacing: .04em;
    }

    .login-logo .brand span { color: var(--text3); }

    .login-logo .role-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bluel);
      color: var(--blue);
      padding: 3px 12px;
      border-radius: 12px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color .15s;
    }

    .form-group input:focus {
      border-color: var(--blue2);
      background: #fff;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: .03em;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }

    .login-btn:hover { background: var(--blue2); }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }

    .login-err {
      margin-top: 12px;
      padding: 10px 14px;
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      border-radius: 8px;
      color: var(--red);
      font-size: 13px;
      display: none;
    }

    /* ── Home screen ── */
    #screen-home {
      padding-bottom: 16px;
    }

    .zone-status-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .hei-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bluel);
      border: 1px solid #BBDEFB;
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 80px;
    }

    .hei-badge .hei-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--blue);
      line-height: 1;
    }

    .hei-badge .hei-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      margin-top: 3px;
    }

    .alert-count-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #FFEBEE;
      border: 1px solid #FFCDD2;
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 80px;
    }

    .alert-count-chip .ac-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 600;
      color: var(--red);
      line-height: 1;
    }

    .alert-count-chip .ac-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text3);
      margin-top: 3px;
    }

    .section-title {
      padding: 14px 16px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text3);
      flex-shrink: 0;
    }

    /* ── Alert Cards ── */
    #alerts-list {
      padding: 0 12px;
      flex: 1;
      overflow-y: auto;
    }

    .alert-card {
      background: var(--surface);
      border-radius: 10px;
      border-left: 4px solid var(--border);
      box-shadow: var(--shad);
      padding: 14px;
      margin-bottom: 12px;
    }

    .alert-card.severity-high { border-left-color: var(--red); }
    .alert-card.severity-moderate { border-left-color: var(--orange); }
    .alert-card.severity-low { border-left-color: var(--yellow); }

    .card-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .card-zone {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
    }

    .status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .status-badge.new { background: #F3F4F6; color: var(--text3); }
    .status-badge.in_progress { background: var(--bluel); color: var(--blue2); }
    .status-badge.resolved { background: #E8F5E9; color: var(--green); }

    .card-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .card-meta span {
      color: var(--text3);
      font-size: 11px;
    }

    .card-signal {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 10px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .btn-start {
      flex: 1;
      padding: 9px 12px;
      background: var(--blue);
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-start:hover { background: var(--blue2); }
    .btn-start:disabled { opacity: .5; cursor: not-allowed; }

    .btn-resolve {
      flex: 1;
      padding: 9px 12px;
      background: #E8F5E9;
      color: var(--green);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid #C8E6C9;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-resolve:hover { background: #C8E6C9; }
    .btn-resolve:disabled { opacity: .5; cursor: not-allowed; }

    /* Resolve form (inline) */
    .resolve-form {
      margin-top: 10px;
      display: none;
    }

    .resolve-form.open { display: block; }

    .resolve-form textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      resize: vertical;
      min-height: 72px;
      outline: none;
      background: var(--bg);
      transition: border-color .15s;
    }

    .resolve-form textarea:focus {
      border-color: var(--blue2);
      background: #fff;
    }

    .resolve-form-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-submit {
      flex: 1;
      padding: 9px 12px;
      background: var(--green);
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-submit:hover { background: #1B5E20; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .btn-cancel {
      padding: 9px 14px;
      background: transparent;
      color: var(--text3);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
    }

    .btn-fixed-it {
  flex: 1;
  padding: 9px 12px;
  background: var(--green);
  color: #fff;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  transition: background .15s;
  }
  .btn-fixed-it:hover:not(:disabled) { background: #1B5E20; }
  .btn-fixed-it:disabled { opacity: .5; cursor: not-allowed; }

  .alert-card.card-resolved {
   opacity: 0.55;
   pointer-events: none;
   background: #F8F9FA;
   border-left-color: #A5D6A7 !important;
}

    /* Empty / loading states */
    .state-msg {
      text-align: center;
      padding: 32px 16px;
      color: var(--text3);
      font-size: 13px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1A2332;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 9999;
      transition: transform .3s ease;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.green { background: var(--green); }
    #toast.red { background: var(--red); }
  </style>
</head>

<body>

  <div class="app">

    <!-- ═══════════ SCREEN 1: LOGIN ═══════════ -->
    <div id="screen-login" class="screen active">
      <div class="login-box">
        <div class="login-logo">
          <div class="brand">HYDRO-EQUITY <span>ENGINE</span></div>
          <div class="role-badge">⚙ Field Operator</div>
        </div>

        <div class="form-group">
          <label for="inp-username">Username</label>
          <input id="inp-username" type="text" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="inp-password">Password</label>
          <input id="inp-password" type="password" placeholder="Enter password" autocomplete="current-password">
        </div>

        <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>

        <div class="login-err" id="login-err"></div>
      </div>
    </div>

    <!-- ═══════════ SCREEN 2: HOME ═══════════ -->
    <div id="screen-home" class="screen">

      <!-- Top bar -->
      <div class="topbar">
        <div>
          <div class="topbar-title" id="zone-title">My Zone</div>
          <div class="topbar-sub" id="user-display">Field Operator</div>
        </div>
        <button class="logout-btn" onclick="doLogout()">Sign Out</button>
      </div>

      <!-- Zone status: HEI + alert count -->
      <div class="zone-status-bar">
        <div class="hei-badge">
          <div class="hei-val" id="hei-val">—</div>
          <div class="hei-lbl">HEI Score</div>
        </div>
        <div class="alert-count-chip">
          <div class="ac-val" id="active-alert-count">—</div>
          <div class="ac-lbl">Active Alerts</div>
        </div>
      </div>

      <!-- Alerts list -->
      <div class="section-title">Active Alerts</div>
      <div id="alerts-list">
        <div class="state-msg" id="alerts-state">Loading alerts…</div>
      </div>

    </div>

  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script>
    const API = 'http://localhost:8000';

    // ─── Auth helpers ──────────────────────────────────────────────
    function getToken() { return sessionStorage.getItem('fo_token'); }
    function setToken(t) { sessionStorage.setItem('fo_token', t); }
    function clearToken() { sessionStorage.removeItem('fo_token'); }
    function getUser() { return JSON.parse(sessionStorage.getItem('fo_user') || 'null'); }
    function setUser(u) { sessionStorage.setItem('fo_user', JSON.stringify(u)); }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() };
    }

    // ─── Screen navigation ─────────────────────────────────────────
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ─── Toast ─────────────────────────────────────────────────────
    let toastTimer = null;
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + (type || '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.className = ''; }, 2800);
    }

    // ─── Login ─────────────────────────────────────────────────────
    document.getElementById('inp-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('inp-username').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('inp-password').focus();
    });

    async function doLogin() {
      const username = document.getElementById('inp-username').value.trim();
      const password = document.getElementById('inp-password').value;
      const errEl = document.getElementById('login-err');
      const btn = document.getElementById('login-btn');

      errEl.style.display = 'none';
      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch(API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Login failed. Check your credentials.');
        }

        const data = await res.json();
        setToken(data.access_token);
        setUser({ username: data.username || username, zone_id: data.zone_id || null });
        onLoginSuccess();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function onLoginSuccess() {
  const user   = getUser();
  const zoneId = user.zone_id || 'Unknown';
  document.getElementById('zone-title').textContent = 'My Zone — ' + zoneId;
  document.getElementById('user-display').textContent = user.username;
  showScreen('screen-home');
  loadZoneStatus();
  loadAlerts();
  startAlertPolling();
}

    function doLogout() {
  stopAlertPolling();
  _knownAlertIds = new Set();
  clearToken();
  sessionStorage.removeItem('fo_user');
  document.getElementById('inp-username').value = '';
  document.getElementById('inp-password').value = '';
  document.getElementById('login-err').style.display = 'none';
  showScreen('screen-login');
}

    // ─── Zone status ───────────────────────────────────────────────
    async function loadZoneStatus() {
      try {
        const res = await fetch(API + '/mobile/zone-status', { headers: authHeaders() });
        if (!res.ok) throw new Error('zone-status failed');
        const d = await res.json();

        const heiVal = d.hei != null ? parseFloat(d.hei).toFixed(2) : '—';
        document.getElementById('hei-val').textContent = heiVal;
        document.getElementById('active-alert-count').textContent = d.active_alert_count != null ? d.active_alert_count : '—';
      } catch (e) {
        document.getElementById('hei-val').textContent = '—';
        document.getElementById('active-alert-count').textContent = '—';
      }
    }

    // ─── Alerts ────────────────────────────────────────────────────
    async function loadAlerts() {
  const listEl  = document.getElementById('alerts-list');
  const stateEl = document.getElementById('alerts-state');

  stateEl.style.display = 'block';
  stateEl.textContent   = 'Loading alerts…';
  listEl.querySelectorAll('.alert-card').forEach(c => c.remove());

  try {
    const res = await fetch(API + '/mobile/alerts', { headers: authHeaders() });
    if (!res.ok) throw new Error('alerts fetch failed');
    const alerts = await res.json();
    if (!Array.isArray(alerts)) throw new Error('unexpected response');

    // Seed known IDs so the first poll does not trigger a false "new task" toast
    _knownAlertIds = new Set(alerts.map(a => a.alert_id));
    _firstPoll     = false;

    _renderAlertList(alerts);
  } catch (e) {
    stateEl.textContent = 'Could not load alerts. Tap to retry.';
    stateEl.onclick     = loadAlerts;
  }
}

  function buildCard(a) {
  const severityClass = a.severity === 'HIGH'     ? 'severity-high'
                      : a.severity === 'MODERATE' ? 'severity-moderate'
                      : 'severity-low';

  const statusKey   = (a.status || 'new').toLowerCase();
  const statusLabel = statusKey === 'in_progress' ? 'In Progress'
    : statusKey.charAt(0).toUpperCase() + statusKey.slice(1);

  const statusClassMap = { new: 'new', in_progress: 'in_progress', resolved: 'resolved' };

  const clps   = a.clps_score != null ? parseFloat(a.clps_score).toFixed(3) : '—';
  const signal = a.dominant_signal || '—';
  const zone   = a.zone_id || a.zone || '—';

  const card    = document.createElement('div');
  card.className = `alert-card ${severityClass}`;
  card.id        = `card-${a.alert_id}`;

  card.innerHTML = `
    <div class="card-row">
      <div class="card-zone">Zone ${zone}</div>
      <span class="status-badge ${statusClassMap[statusKey] || 'new'}">${statusLabel}</span>
    </div>
    <div class="card-meta">CLPS <span>score</span> ${clps}</div>
    <div class="card-signal">⚡ ${signal}</div>
    <div class="card-actions">
      <button class="btn-start" id="btn-start-${a.alert_id}"
              onclick="startWork(${a.alert_id})"
              ${statusKey !== 'new' ? 'disabled' : ''}>
        Start Work
      </button>
      <button class="btn-fixed-it" id="btn-fixedit-${a.alert_id}"
              onclick="openFixedIt(${a.alert_id})"
              ${statusKey === 'resolved' || statusKey === 'resolve_requested' ? 'disabled' : ''}>
        Fixed It
      </button>
    </div>
    <!-- N2: Fixed It inline form — hidden until Fixed It is tapped -->
    <div class="resolve-form" id="resolve-form-${a.alert_id}">
      <textarea id="resolve-report-${a.alert_id}"
                placeholder="Brief report — what did you fix?"></textarea>
      <div class="resolve-form-actions">
        <button class="btn-submit" onclick="submitFixedIt(${a.alert_id})">Submit</button>
        <button class="btn-cancel" onclick="closeFixedIt(${a.alert_id})">Cancel</button>
      </div>
    </div>
  `;

  return card;
}

    // ─── Start Work ────────────────────────────────────────────────
    async function startWork(id) {
      const btn = document.getElementById('btn-start-' + id);
      btn.disabled = true;
      btn.textContent = 'Starting…';

      try {
        const res = await fetch(API + '/mobile/alerts/' + id + '/start', {
          method: 'POST',
          headers: authHeaders()
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || 'Failed to start');
        showToast('Work started on alert #' + id, 'green');

        // Update status badge
        const card = document.getElementById('card-' + id);
        if (card) {
          const badge = card.querySelector('.status-badge');
          badge.className = 'status-badge in_progress';
          badge.textContent = 'In Progress';
        }
        btn.textContent = 'In Progress';
      } catch (e) {
        showToast(e.message, 'red');
        btn.disabled = false;
        btn.textContent = 'Start Work';
      }
    }

    function openFixedIt(id) {
      document.getElementById(`resolve-form-${id}`).classList.add('open');
      document.getElementById(`resolve-report-${id}`).focus();
     }

    function closeFixedIt(id) {
  document.getElementById(`resolve-form-${id}`).classList.remove('open');
}

    async function submitFixedIt(id) {
  const report = document.getElementById(`resolve-report-${id}`).value.trim();
  const btn    = document.querySelector(`#resolve-form-${id} .btn-submit`);

  if (!report) {
    showToast('Please enter a brief report.', 'red');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Sending…';

  try {
    const res = await fetch(API + '/mobile/alerts/' + id + '/resolve', {
      method:  'POST',
      headers: authHeaders(),
      body:    JSON.stringify({ report })
    });
    if (!res.ok) throw new Error(((await res.json().catch(() => ({}))).detail) || 'Failed');

    // N2: success — button → "Sent ✓", card greys out, no further interaction
    const fixedItBtn = document.getElementById(`btn-fixedit-${id}`);
    if (fixedItBtn) {
      fixedItBtn.textContent = 'Sent ✓';
      fixedItBtn.disabled    = true;
    }
    const startBtn = document.getElementById(`btn-start-${id}`);
    if (startBtn) startBtn.disabled = true;

    closeFixedIt(id);

    // Grey out the entire card (N2 spec)
    const card = document.getElementById(`card-${id}`);
    if (card) card.classList.add('card-resolved');

    showToast('Report submitted. Waiting for engineer approval.', 'green');
    loadZoneStatus(); // refresh the HEI + alert count chip

  } catch (e) {
    showToast(e.message, 'red');
    btn.disabled    = false;
    btn.textContent = 'Submit';
  }
}

let _pollInterval    = null;
let _knownAlertIds   = new Set();
let _firstPoll       = true;

function startAlertPolling() {
  if (_pollInterval) return; // already running
  _pollInterval = setInterval(async () => {
    await _pollAlerts();
  }, 5000);
}

function stopAlertPolling() {
  if (_pollInterval) {
    clearInterval(_pollInterval);
    _pollInterval = null;
  }
}

async function _pollAlerts() {
  try {
    const res = await fetch(API + '/mobile/alerts', { headers: authHeaders() });
    if (!res.ok) return; // silent fail — don't disrupt the UI
    const alerts = await res.json();
    if (!Array.isArray(alerts)) return;

    const currentIds = new Set(alerts.map(a => a.alert_id));

    if (!_firstPoll) {
      // Check for any IDs that weren't in the previous set
      const newOnes = alerts.filter(a => !_knownAlertIds.has(a.alert_id));
      if (newOnes.length > 0) {
        showToast(`New task assigned (${newOnes.length} alert${newOnes.length > 1 ? 's' : ''})`, 'green');
        // Re-render the full list so the new card appears
        _renderAlertList(alerts);
      }
    } else {
      // First poll: just render the list silently
      _renderAlertList(alerts);
      _firstPoll = false;
    }

    _knownAlertIds = currentIds;

  } catch (e) {
    // Silent fail on poll errors — don't toast every 5 seconds
  }
}

// N2: extracted render logic so both loadAlerts() and _pollAlerts() can share it
function _renderAlertList(alerts) {
  const listEl  = document.getElementById('alerts-list');
  const stateEl = document.getElementById('alerts-state');

  // Remove existing cards (keep the state-msg element)
  listEl.querySelectorAll('.alert-card').forEach(c => c.remove());

  if (!alerts.length) {
    stateEl.style.display = 'block';
    stateEl.textContent   = 'No active alerts for your zone.';
    stateEl.onclick       = null;
    return;
  }

  stateEl.style.display = 'none';
  alerts.forEach(a => listEl.appendChild(buildCard(a)));
}

      if (getToken()) {
        onLoginSuccess();
      }
