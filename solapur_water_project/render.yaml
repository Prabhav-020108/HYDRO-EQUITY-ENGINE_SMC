services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: dhara-api
    env: python
    plan: free
    rootDir: solapur_water_project
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dhara-db
          property: connectionString
      - key: SECRET_KEY
        value: hydro_equity_secret_key_samved2026_devsters_rvce
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_HOURS
        value: "8"
      - key: ENGINEER_PASSWORD
        value: demo123
      - key: WARD_PASSWORD
        value: demo123
      - key: COMMISSIONER_PASSWORD
        value: demo123
      - key: FIELD_OP_PASSWORD
        value: demo123
      - key: CITIZEN_PASSWORD
        value: demo123
      # Set ALLOWED_ORIGINS after you know your frontend URL
      - key: ALLOWED_ORIGINS
        value: "*"

  # ── Frontend Static Site ─────────────────────────────────────
  - type: static
    name: dhara-frontend
    rootDir: solapur_water_project/frontend
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

databases:
  - name: dhara-db
    plan: free
